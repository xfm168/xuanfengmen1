<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>玄风门 - 预览版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:calc(100vw / 375);}
body{font-family:"思源宋体",SimSun,serif;background:#040716;color:#e6c880;overflow:hidden;width:100vw;height:100vh;}

/* 页面容器 */
.wrap{
    width:100%;
    height:100%;
    background: url('https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/30211311109a40189d40d3f121033111~tplv-a9rns2rl98-image.image') center/cover no-repeat;
    padding: 1rem 0.5rem 4.5rem;
    position:relative;
    overflow-y: auto;
}

/* 顶部栏 */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:2rem;
}
.logo-top{
    display:flex;
    align-items:center;
    gap:0.3rem;
    font-size:1.2rem;
    color:#d4af37;
}
.taiji-icon{
    width:2rem;
    height:2rem;
    border-radius:50%;
    background:linear-gradient(90deg,#000 50%,#d4af37 50%);
    position:relative;
}
.taiji-icon::before{
    content:"";
    width:0.6rem;height:0.6rem;
    border-radius:50%;background:#000;
    position:absolute;top:0.3rem;left:1rem;
}
.taiji-icon::after{
    content:"";
    width:0.6rem;height:0.6rem;
    border-radius:50%;background:#d4af37;
    position:absolute;bottom:0.3rem;right:1rem;
}
.my-btn{
    border:1px solid rgba(212,175,55,0.5);
    border-radius:999px;
    padding:0.2rem 0.7rem;
    display:flex;
    align-items:center;
    gap:0.2rem;
    font-size:0.9rem;
}

/* 标题区域 */
.main-title{text-align:center;margin-bottom:1.5rem;position:relative;}
.big-title{
    font-size:4.2rem;
    font-weight:bold;
    color:#d4af37;
    letter-spacing:0.6rem;
    position:relative;
    display:inline-block;
}
.stamp{
    position:absolute;
    right:-2rem;
    top:0.3rem;
    width:1.8rem;
    height:0.5rem;
    background:#c71e1e;
    color:#fff;
    font-size:0.7rem;
    writing-mode:vertical-rl;
    display:grid;
    place-items:center;
    border-radius:2px;
    padding: 0.3rem 0;
    line-height: 1.2;
}
.desc-text{
    margin-top:0.8rem;
    font-size:1.3rem;
    line-height:2;
    letter-spacing:1px;
}

/* 太极八卦区域 */
.bagua-box{
    height:18rem;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.taiji-compass{
    width:16rem;
    height:16rem;
    position:relative;
}

.compass-ring{
    position:absolute;
    top:50%;
    left:50%;
    border-radius:50%;
    border:1px solid rgba(212,175,55,0.4);
    transform:translate(-50%,-50%);
}
.ring-outer{width:100%;height:100%;border-width:2px;border-color:rgba(212,175,55,0.6);}
.ring-mid{width:85%;height:85%;border-color:rgba(212,175,55,0.3);}
.ring-inner{width:50%;height:50%;border-color:rgba(212,175,55,0.5);}

.bagua-text{
    position:absolute;
    font-size:1rem;
    color:#d4af37;
    font-weight:500;
}
.bagua-text.qian{top:0.5rem;left:50%;transform:translateX(-50%);}
.bagua-text.dui{top:2rem;right:2rem;}
.bagua-text.li{top:50%;right:0.5rem;transform:translateY(-50%);}
.bagua-text.zhen{bottom:2rem;right:2rem;}
.bagua-text.xun{bottom:0.5rem;left:50%;transform:translateX(-50%);}
.bagua-text.kan{top:50%;left:0.5rem;transform:translateY(-50%);}
.bagua-text.gen{top:2rem;left:2rem;}
.bagua-text.kun{bottom:2rem;left:2rem;}

.taiji-center{
    position:absolute;
    top:50%;
    left:50%;
    width:7rem;
    height:7rem;
    border-radius:50%;
    transform:translate(-50%,-50%);
    background:linear-gradient(180deg,#fff 0%,#fff 50%,#000 50%,#000 100%);
    overflow:hidden;
    border:2px solid #d4af37;
    box-shadow:0 0 30px rgba(212,175,55,0.3);
}
.taiji-center::before{
    content:"";
    position:absolute;
    top:0;
    left:50%;
    width:50%;
    height:50%;
    border-radius:50%;
    background:#000;
    transform:translateX(-50%);
}
.taiji-center::after{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    width:50%;
    height:50%;
    border-radius:50%;
    background:#fff;
    transform:translateX(-50%);
}
.taiji-dot{
    position:absolute;
    width:1.2rem;
    height:1.2rem;
    border-radius:50%;
    left:50%;
    transform:translateX(-50%);
    z-index:2;
}
.taiji-dot.top{top:1.6rem;background:#fff;}
.taiji-dot.bottom{bottom:1.6rem;background:#000;}

/* 功能卡片2列布局 */
.card-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0.8rem;
    margin-bottom:2rem;
}
.func-card{
    background:rgba(8,12,30,0.75);
    border:1px solid rgba(212,175,55,0.4);
    border-radius:0.6rem;
    padding:1.2rem 0.8rem;
    display:flex;
    align-items:center;
    gap:0.8rem;
    position:relative;
}
.card-icon{
    width:3.2rem;height:3.2rem;
    border:1px solid #d4af37;
    border-radius:50%;
    display:grid;
    place-items:center;
    font-size:1.6rem;
    color:#d4af37;
    flex-shrink:0;
}
.card-text h3{font-size:1.1rem;margin-bottom:0.3rem;color:#f2dd9c;}
.card-text p{font-size:0.75rem;color:#cbb87e;}
.card-arrow{
    position:absolute;
    right:0.8rem;
    bottom:1rem;
    color:rgba(212,175,55,0.65);
    font-size:0.9rem;
}

/* 中间标语 */
.slogan{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:0.6rem;
    font-size:1.1rem;
    letter-spacing:2px;
    margin-bottom:2rem;
}
.slogan span{
    width:1.5rem;height:1px;
    background:linear-gradient(90deg,transparent,#d4af37,transparent);
}

/* 底部导航栏 固定底部 */
.tab-bar{
    position:fixed;
    left:0;bottom:0;
    width:100%;
    height:4.2rem;
    background:rgba(5,8,22,0.95);
    border-top:1px solid rgba(212,175,55,0.3);
    display:flex;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
}
.tab-item{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0.3rem;
    font-size:0.75rem;
    color:#988862;
}
.tab-item.active{color:#d4af37;}
.tab-icon{font-size:1.5rem;}

.preview-label{
    position:fixed;
    top:0.5rem;
    right:0.5rem;
    background:rgba(199,30,30,0.9);
    color:#fff;
    padding:0.3rem 0.8rem;
    font-size:0.8rem;
    border-radius:0.3rem;
    z-index:999;
}
</style>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="preview-label">预览版</div>
<div class="wrap">
    <div class="top-bar">
        <div class="logo-top">
            <div class="taiji-icon"></div>
            <span>玄风门</span>
        </div>
        <div class="my-btn">
            <i class="fa-solid fa-user"></i>
            <span>我的</span>
        </div>
    </div>

    <div class="main-title">
        <div class="big-title">
            玄风门
            <div class="stamp">玄风</div>
        </div>
        <div class="desc-text">
            天地有象，万事有机<br>知其势者，顺势而行
        </div>
    </div>

    <div class="bagua-box">
        <div class="taiji-compass">
            <div class="compass-ring ring-outer"></div>
            <div class="compass-ring ring-mid"></div>
            <div class="compass-ring ring-inner"></div>
            
            <div class="bagua-text qian">乾</div>
            <div class="bagua-text dui">兑</div>
            <div class="bagua-text li">离</div>
            <div class="bagua-text zhen">震</div>
            <div class="bagua-text xun">巽</div>
            <div class="bagua-text kan">坎</div>
            <div class="bagua-text gen">艮</div>
            <div class="bagua-text kun">坤</div>
            
            <div class="taiji-center">
                <div class="taiji-dot top"></div>
                <div class="taiji-dot bottom"></div>
            </div>
        </div>
    </div>

    <div class="card-grid">
        <div class="func-card" onclick="goTodayLuck()">
            <div class="card-icon"><i class="fa-solid fa-yin-yang"></i></div>
            <div class="card-text">
                <h3>今日卦运</h3>
                <p>每日指引 趋吉避凶</p>
            </div>
            <div class="card-arrow">›</div>
        </div>
        <div class="func-card" onclick="goLiuYao()">
            <div class="card-icon"><i class="fa-solid fa-coins"></i></div>
            <div class="card-text">
                <h3>六爻解卦</h3>
                <p>洞察天机 指点迷津</p>
            </div>
            <div class="card-arrow">›</div>
        </div>
        <div class="func-card" onclick="goFengShui()">
            <div class="card-icon"><i class="fa-solid fa-torii-gate"></i></div>
            <div class="card-text">
                <h3>风水勘测</h3>
                <p>观宅察势 趋吉避凶</p>
            </div>
            <div class="card-arrow">›</div>
        </div>
        <div class="func-card" onclick="goRecord()">
            <div class="card-icon"><i class="fa-solid fa-book-open"></i></div>
            <div class="card-text">
                <h3>卦运记录</h3>
                <p>记录卦象 追踪运势</p>
            </div>
            <div class="card-arrow">›</div>
        </div>
    </div>

    <div class="slogan">
        <span></span>
        遇事不决，可问玄风
        <span></span>
    </div>

    <div class="tab-bar">
        <div class="tab-item active">
            <div class="tab-icon"><i class="fa-solid fa-home"></i></div>
            <span>首页</span>
        </div>
        <div class="tab-item">
            <div class="tab-icon"><i class="fa-solid fa-scroll"></i></div>
            <span>卦运记录</span>
        </div>
        <div class="tab-item">
            <div class="tab-icon"><i class="fa-solid fa-yin-yang"></i></div>
            <span>工具</span>
        </div>
        <div class="tab-item">
            <div class="tab-icon"><i class="fa-solid fa-user"></i></div>
            <span>我的</span>
        </div>
    </div>
</div>

<script>
function goTodayLuck(){ console.log('跳转：今日卦运'); }
function goLiuYao(){ console.log('跳转：六爻解卦'); }
function goFengShui(){ console.log('跳转：风水勘测'); }
function goRecord(){ console.log('跳转：卦运记录'); }
</script>
</body>
</html>
